generations:
  - name: "First Generation"
    start_year: 2008
    end_year: 2017
    description: "The first-generation Volvo XC60 was introduced as a compact luxury crossover SUV positioned between the XC70 and XC90 in Volvo's lineup. Built on Volvo's P3 platform (shared with S60, V60), it featured distinctive styling with a coupe-like roofline and Volvo's signature shoulder line. Powertrain options included various five and six-cylinder petrol and diesel engines, with the T6 model featuring a turbocharged inline-six producing around 300 horsepower. All-wheel drive was standard or optional. The interior showcased Scandinavian design with Volvo's floating center console and high-quality materials. Safety was a major selling point, with City Safety low-speed automatic braking system as standard—a first in the industry. A significant facelift in 2013 updated exterior styling, grille, front lights, and introduced new materials and dashboard trims with a 7-inch display. The first-generation XC60 proved to be Volvo's most popular model globally since 2009, successfully blending practicality, safety, and premium features."

  - name: "Second Generation"
    start_year: 2018
    end_year: null
    description: "The second-generation Volvo XC60, built on Volvo's Scalable Product Architecture (SPA) platform shared with the 90-series models, was unveiled at the 2017 Geneva Motor Show. The exterior design evolved Volvo's language with refined proportions, distinctive Thor's Hammer LED headlights, and a more athletic stance. The interior represents a significant upgrade with premium materials, minimalist Scandinavian design centered around a 9-inch portrait-oriented touchscreen. A key departure is the exclusive use of four-cylinder engines with various electrification levels: T5 (turbocharged), T6 (turbo and supercharged), D4/D5 diesels, and T8 Twin Engine plug-in hybrids producing up to 400 combined horsepower. Mild hybrid technology was introduced in 2020. Safety reached new heights with Pilot Assist semi-autonomous driving and advanced collision avoidance. A 2021 facelift introduced Google-based infotainment systems, with another facelift in August 2025 bringing a redesigned grille, larger 11.2-inch touchscreen, and updated digital instrument cluster. The second-generation XC60 has continued as Volvo's best-selling model, winning 2018 World Car of the Year."